events {
  worker_connections 1024;
}

http {

  # ── Timeouts ─────────────────────────────────────────────────────────────
  # Applies to all proxy_pass blocks. Prevents hanging connections under load.
  proxy_connect_timeout  5s;
  proxy_read_timeout     30s;
  proxy_send_timeout     30s;

  # ── Rate limiting zones ──────────────────────────────────────────────────
  # Keyed on binary client IP. 10m stores ~160k unique IPs.
  # auth_limit: tighter — 5 req/s with a small burst to absorb login flows
  # api_limit:  looser  — 30 req/s with burst headroom for authenticated traffic
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
  limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;

  # ── Upstreams ─────────────────────────────────────────────────────────────
  upstream auth_service       { server auth-service:8080; }
  upstream workspace_service  { server workspace-service:9000; }
  upstream ingestion_service  { server ingestion-service:9001; }
  upstream graph_service      { server graph-service:9002; }
  upstream vector_service     { server vector-service:9003; }
  upstream doc_service        { server documentation-service:9005; }
  upstream search_service     { server search-service:9006; }
  upstream ci_vuln_service    { server ci-vuln-service:9007; }
  upstream frontend_app       { server frontend:3000; }


  server {
    listen 80;

    # ── Auth failure handlers ────────────────────────────────────────────
    # auth_request returns 401/403 — these named locations produce clean JSON
    # instead of the default nginx HTML error page.
    error_page 401 = @auth_error;
    error_page 403 = @auth_forbidden;

    location @auth_error {
      default_type application/json;
      return 401 '{"error":"unauthorized","message":"Valid JWT required"}';
    }

    location @auth_forbidden {
      default_type application/json;
      return 403 '{"error":"forbidden","message":"Access denied"}';
    }

    # ── Internal auth subrequest — never reachable by external clients ───
    # `internal` ensures only auth_request directives can call this location.
    location = /auth/verify {
      internal;
      proxy_pass              http://auth_service/auth/verify;
      proxy_pass_request_body off;
      proxy_set_header Content-Length   "";
      proxy_set_header X-Original-URI   $request_uri;
      proxy_set_header X-Real-IP        $remote_addr;
      proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    location /webhooks/github {
        proxy_pass http://ingestion_service;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Auth pages served by frontend (auth-service redirects here) ────
    location /auth/success {
      proxy_pass http://frontend_app;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/error {
      proxy_pass http://frontend_app;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Public auth routes — no auth_request ────────────────────────────
    location /auth/ {
      limit_req zone=auth_limit burst=10 nodelay;

      proxy_pass http://auth_service;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Protected routes ─────────────────────────────────────────────────
    # Trust model: $user_id is set from the auth_request response header
    # (auth-service sets x-user-id on /auth/verify success).
    # proxy_set_header X-User-ID $user_id always overwrites any X-User-ID
    # the client may try to inject — $http_x_user_id is never forwarded.

    location /api/workspaces {
      rewrite ^/api/(.*)$ /$1 break;
      limit_req zone=api_limit burst=50 nodelay;

      auth_request     /auth/verify;
      auth_request_set $user_id $upstream_http_x_user_id;

      proxy_pass http://workspace_service;
      proxy_set_header X-User-ID         $user_id;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ingest {
      rewrite ^/api/(.*)$ /$1 break;
      limit_req zone=api_limit burst=20 nodelay;

      auth_request     /auth/verify;
      auth_request_set $user_id $upstream_http_x_user_id;

      proxy_pass http://ingestion_service;
      proxy_set_header X-User-ID         $user_id;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/graph {
      rewrite ^/api/(.*)$ /$1 break;
      limit_req zone=api_limit burst=50 nodelay;

      auth_request     /auth/verify;
      auth_request_set $user_id $upstream_http_x_user_id;

      proxy_pass http://graph_service;
      proxy_set_header X-User-ID         $user_id;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/vector {
      rewrite ^/api/(.*)$ /$1 break;
      limit_req zone=api_limit burst=50 nodelay;

      auth_request     /auth/verify;
      auth_request_set $user_id $upstream_http_x_user_id;

      proxy_pass http://vector_service;
      proxy_set_header X-User-ID         $user_id;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/docs {
      rewrite ^/api/(.*)$ /$1 break;
      limit_req zone=api_limit burst=50 nodelay;

      auth_request     /auth/verify;
      auth_request_set $user_id $upstream_http_x_user_id;

      proxy_pass http://doc_service;
      proxy_set_header X-User-ID         $user_id;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/search {
      rewrite ^/api/(.*)$ /$1 break;
      limit_req zone=api_limit burst=50 nodelay;

      auth_request     /auth/verify;
      auth_request_set $user_id $upstream_http_x_user_id;

      proxy_pass http://search_service;
      proxy_set_header X-User-ID         $user_id;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ci {
      rewrite ^/api/(.*)$ /$1 break;
      limit_req zone=api_limit burst=20 nodelay;

      auth_request     /auth/verify;
      auth_request_set $user_id $upstream_http_x_user_id;

      proxy_pass http://ci_vuln_service;
      proxy_set_header X-User-ID         $user_id;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Frontend (catch-all — must be last) ─────────────────────────────
    location / {
      proxy_pass http://frontend_app;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # WebSocket support for Next.js HMR in development
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}